<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a18;
  --text:#e0e0f0;
  --muted:#8899bb;
  --muted-2:#99aacc;
  --muted-3:#667799;
  --surface:#151530;
  --surface-2:#1a1a40;
  --surface-soft:rgba(255,255,255,0.03);
  --surface-soft-2:rgba(255,255,255,0.06);
  --border:#2a2a55;
  --border-2:#333366;
  --border-soft:#1a1a33;
  --header-bg:linear-gradient(135deg,#1a1040 0%,#2a1860 40%,#4a2080 100%);
  --header-border:#6a40cc;
  --topbar-bg:#1a1a33;
  --topbar-link:#00d1ff;
  --banner-bg:linear-gradient(180deg,rgba(80,40,160,0.3),transparent);
  --route-bg:rgba(40,60,120,0.2);
  --comment-bg:rgba(40,40,80,0.3);
  --footer:#444466;
  --empty:#556677;
  --loading:#667788;
  --hover-shadow:0 6px 24px rgba(80,60,180,0.2);
}
html[data-theme="light"]{
  --bg:#f6f1ea;
  --text:#261d18;
  --muted:#6e6158;
  --muted-2:#806f64;
  --muted-3:#918176;
  --surface:#fffaf4;
  --surface-2:#fff;
  --surface-soft:rgba(160,114,70,0.06);
  --surface-soft-2:rgba(160,114,70,0.1);
  --border:#e6d8ca;
  --border-2:#d8c4b2;
  --border-soft:#ebdfd4;
  --header-bg:linear-gradient(135deg,#fff6ea 0%,#ffe8d3 46%,#ffd6bd 100%);
  --header-border:#e7b48b;
  --topbar-bg:#fff8f0;
  --topbar-link:#c35b22;
  --banner-bg:linear-gradient(180deg,rgba(255,205,165,0.34),transparent);
  --route-bg:rgba(255,185,120,0.18);
  --comment-bg:rgba(255,242,229,0.96);
  --footer:#8d7565;
  --empty:#968276;
  --loading:#7d7067;
  --hover-shadow:0 10px 28px rgba(137,95,58,0.12);
}
body{
  font-family:'Segoe UI','Malgun Gothic',sans-serif;
  background:var(--bg);color:var(--text);
  min-height:100vh;
}

/* ── Header ── */
header{
  background:var(--header-bg);
  padding:clamp(24px,5vw,48px) 20px;text-align:center;
  position:relative;overflow:hidden;
  border-bottom:3px solid var(--header-border);
}
header::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 120%,rgba(120,60,255,0.25),transparent 70%);
  pointer-events:none;
}
header h1{
  font-size:clamp(24px,5vw,42px);font-weight:800;
  background:linear-gradient(90deg,#ff88cc,#88ccff,#ffcc44);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
  margin-bottom:8px;position:relative;
}
header p{
  color:var(--muted);font-size:clamp(13px,2.5vw,18px);
  position:relative;
}

.utility-header{
  background:var(--topbar-bg);
  border-bottom:1px solid var(--border);
  padding:15px 0;
}
.utility-header-inner{
  max-width:900px;margin:0 auto;padding:0 16px;
  display:flex;align-items:center;justify-content:center;gap:12px;flex-wrap:wrap;
  text-align:center;
}
.utility-text{
  color:var(--muted);font-size:0.9rem;
}
.utility-link{
  display:inline-block;color:var(--topbar-link);
  font-weight:700;text-decoration:none;font-size:0.9rem;
}
.utility-header span{color:var(--muted)!important}
.utility-header a{color:var(--topbar-link)!important}
.theme-toggle{
  border:1px solid var(--border-2);
  background:var(--surface);
  color:var(--text);
  border-radius:999px;
  padding:8px 14px;
  font:inherit;
  font-size:13px;
  font-weight:700;
  cursor:pointer;
  display:inline-flex;align-items:center;gap:6px;
  box-shadow:0 4px 14px rgba(0,0,0,0.08);
  transition:transform 0.2s, border-color 0.2s, background 0.2s;
}
.theme-toggle:hover{transform:translateY(-1px)}

/* ── Play banner ── */
.play-banner{
  text-align:center;padding:16px;
  background:var(--banner-bg);
}
.play-banner a{
  display:inline-flex;align-items:center;gap:10px;
  padding:12px 28px;border-radius:50px;
  background:linear-gradient(135deg,#e94560,#ff6b81);
  color:#fff;text-decoration:none;font-weight:bold;
  font-size:clamp(13px,2.8vw,17px);
  box-shadow:0 4px 20px rgba(233,69,96,0.4);
  transition:transform 0.2s,box-shadow 0.2s;
}
.play-banner a:hover{
  transform:translateY(-2px);
  box-shadow:0 6px 28px rgba(233,69,96,0.5);
}

/* ── Footer / Ad ── */
.ad-footer{
  max-width:900px;margin:24px auto 0;padding:0 16px 24px;
  text-align:center;
}
.ad-footer .ad-label{
  font-size:12px;color:#ffcc44;margin-bottom:10px;
  background:rgba(255,204,68,0.1);padding:8px 12px;
  border-radius:8px;border:1px solid rgba(255,204,68,0.2);
  display:inline-block;font-weight:600;
}

/* ── Coupang Banner In Detail ── */
.detail-ad-banner{
  margin:20px 0;text-align:center;
  background:var(--surface-soft);padding:16px;
  border-radius:14px;border:1px solid var(--border);
}
.detail-ad-banner a{display:inline-block;transition:transform 0.2s}
.detail-ad-banner a:hover{transform:scale(1.02)}
.detail-ad-banner img{border-radius:8px;box-shadow:0 4px 15px rgba(0,0,0,0.3)}
.detail-ad-label{
  font-size:11px;color:var(--muted-3);margin-top:10px;font-weight:500;
}

/* ── Main ── */
main{max-width:900px;margin:0 auto;padding:16px}

/* ── Area cards grid ── */
.area-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(min(100%,260px),1fr));
  gap:14px;
}
.area-card{
  background:linear-gradient(145deg,var(--surface),var(--surface-2));
  border:1px solid var(--border);border-radius:16px;
  padding:18px;cursor:pointer;
  transition:transform 0.2s,border-color 0.2s,box-shadow 0.2s;
}
.area-card:hover{
  transform:translateY(-3px);border-color:#5544aa;
  box-shadow:var(--hover-shadow);
}
.area-card.empty{opacity:0.45;cursor:default}
.area-card.empty:hover{transform:none;border-color:var(--border);box-shadow:none}
.area-card.coupang-card{
  position:relative;
  overflow:hidden;
  border-color:rgba(255,204,68,0.55)!important;
  background:linear-gradient(145deg,rgba(255,212,92,0.08),rgba(255,255,255,0.03))!important;
  box-shadow:
    0 0 0 1px rgba(255,215,102,0.24),
    0 0 14px rgba(255,204,68,0.18),
    0 0 28px rgba(255,170,40,0.12);
  animation:coupang-neon-pulse 1.35s ease-in-out infinite;
}
.area-card.coupang-card::after{
  content:'';
  position:absolute;
  inset:-30%;
  background:linear-gradient(115deg,transparent 34%,rgba(255,234,164,0.32) 50%,transparent 66%);
  transform:translateX(-135%) rotate(10deg);
  animation:coupang-neon-sheen 2.2s linear infinite;
  pointer-events:none;
}
.area-card.coupang-card:hover{
  transform:translateY(-3px);
  border-color:rgba(255,226,122,0.82)!important;
  box-shadow:
    0 0 0 1px rgba(255,236,166,0.38),
    0 0 18px rgba(255,215,102,0.34),
    0 0 38px rgba(255,170,40,0.24);
}
.area-card.coupang-card > *{position:relative;z-index:1}
.area-card .card-top{
  display:flex;align-items:center;gap:10px;margin-bottom:10px;
}
.area-card .card-emoji{font-size:clamp(28px,7vw,36px)}
.area-card .card-title{
  font-size:clamp(17px,3.5vw,22px);font-weight:700;color:var(--text);
}
.area-card .card-station{
  color:var(--muted);font-size:clamp(11px,2.5vw,13px);
}
.area-card .card-summary{
  color:var(--muted-2);font-size:clamp(12px,2.5vw,14px);
  margin-bottom:10px;line-height:1.5;
}
.area-card .card-stats{
  display:flex;flex-wrap:wrap;gap:6px 12px;
  font-size:clamp(11px,2.3vw,13px);color:var(--muted);
  margin-bottom:10px;
}
.area-card .card-stats span{display:flex;align-items:center;gap:4px}
.area-card .card-envs{
  display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px;
}
.env-tag{
  padding:2px 8px;border-radius:8px;font-size:11px;
  background:var(--surface-soft);color:var(--muted-2);
  border:1px solid var(--border);
}
.area-card .card-tags{display:flex;gap:4px;flex-wrap:wrap}
.spot-tag{
  display:inline-block;padding:2px 9px;border-radius:10px;
  font-size:11px;font-weight:600;
}
.tag-HOT{background:rgba(233,69,96,0.2);color:#ff6b81;border:1px solid rgba(233,69,96,0.3)}
.tag-대형{background:rgba(68,136,255,0.2);color:#88bbff;border:1px solid rgba(68,136,255,0.3)}
.tag-저렴{background:rgba(255,204,68,0.2);color:#ffdd66;border:1px solid rgba(255,204,68,0.3)}
.tag-신규{background:rgba(68,187,68,0.2);color:#6bff6b;border:1px solid rgba(68,187,68,0.3)}

/* ── Detail view ── */
.detail-back{
  display:inline-flex;align-items:center;gap:6px;
  padding:8px 16px;border-radius:10px;
  background:var(--surface-soft);border:1px solid var(--border-2);
  color:var(--muted-2);cursor:pointer;font-size:14px;
  font-family:inherit;margin-bottom:16px;
  transition:all 0.2s;
}
.detail-back:hover{background:var(--surface-soft-2);color:var(--text)}
.detail-header{
  margin-bottom:20px;
}
.detail-header h2{
  font-size:clamp(22px,5vw,32px);color:var(--text);
  display:flex;align-items:center;gap:10px;
}
.detail-header .sub{
  color:var(--muted);font-size:clamp(13px,2.8vw,16px);
  margin-top:4px;
}

/* Route section */
.section-title{
  font-size:clamp(15px,3vw,18px);font-weight:700;color:#ccddff;
  margin:24px 0 12px;padding-bottom:8px;
  border-bottom:1px solid var(--border-soft);
  display:flex;align-items:center;gap:8px;
}
.route-steps{
  list-style:none;padding:0;
  counter-reset:step;
}
.route-steps li{
  counter-increment:step;
  padding:10px 12px 10px 42px;
  position:relative;
  font-size:clamp(13px,2.8vw,15px);color:var(--muted-2);
  border-left:2px solid var(--border-2);
  margin-left:14px;
}
.route-steps li:last-child{border-left-color:transparent}
.route-steps li::before{
  content:counter(step);
  position:absolute;left:-13px;top:8px;
  width:24px;height:24px;border-radius:50%;
  background:linear-gradient(135deg,#4a2080,#6a40cc);
  color:#fff;font-size:12px;font-weight:bold;
  display:flex;align-items:center;justify-content:center;
}
.route-distance{
  color:var(--muted-2);font-size:14px;margin:10px 0;
  padding:8px 14px;background:var(--route-bg);
  border-radius:10px;display:inline-block;
}
.map-container{
  margin:14px 0;border-radius:12px;overflow:hidden;
  border:1px solid var(--border);
}
.map-container iframe{
  width:100%;height:300px;border:none;
}
.shorts-list{
  display:flex;flex-direction:column;align-items:center;gap:12px;
  padding:4px 0 12px;
}
.shorts-container iframe{
  width:min(100%, 360px);height:640px;border:none;
  border-radius:12px;border:1px solid var(--border);
}
.map-actions{
  display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;
}
.map-btn{
  padding:8px 16px;border-radius:10px;
  background:linear-gradient(135deg,#2a60cc,#4a80ee);
  color:#fff;text-decoration:none;font-size:13px;font-weight:600;
  transition:opacity 0.2s;display:inline-flex;align-items:center;gap:6px;
}
.map-btn:hover{opacity:0.85}
.map-btn.secondary{
  background:linear-gradient(135deg,#3a3a6a,#4a4a8a);
}

/* Spot cards */
.spot-list{display:flex;flex-direction:column;gap:12px}
.spot-card{
  background:linear-gradient(145deg,var(--surface),var(--surface-2));
  border:1px solid var(--border);border-radius:14px;
  padding:16px;transition:border-color 0.2s;
}
.spot-card:hover{border-color:#4a4a88}
.spot-card.recommended{
  border-color:#cc9933;
  box-shadow:0 0 12px rgba(204,153,51,0.15);
}
.spot-top{
  display:flex;justify-content:space-between;align-items:flex-start;
  gap:8px;margin-bottom:8px;
}
.spot-name{
  font-size:clamp(15px,3vw,18px);font-weight:700;color:var(--text);
}
.spot-rec-badge{
  padding:3px 10px;border-radius:8px;font-size:11px;font-weight:700;
  background:rgba(255,200,50,0.15);color:#ffcc44;
  border:1px solid rgba(255,200,50,0.3);
  white-space:nowrap;
}
.spot-info{
  display:grid;grid-template-columns:1fr 1fr;gap:6px 16px;
  font-size:clamp(12px,2.5vw,14px);color:var(--muted);
  margin-bottom:8px;
}
.spot-info .label{color:var(--muted-3);font-weight:600}
.spot-rating{
  display:flex;align-items:center;gap:6px;
  margin-bottom:8px;
}
.spot-stars{color:#ffcc44;font-size:16px;letter-spacing:2px}
.spot-rating-num{color:var(--muted-2);font-size:13px}
.spot-comment{
  color:var(--muted-2);font-size:clamp(12px,2.5vw,14px);
  line-height:1.6;padding:10px 12px;
  background:var(--comment-bg);border-radius:10px;
  border-left:3px solid #4a2080;
  margin-bottom:8px;
}
.spot-actions{display:flex;gap:8px;flex-wrap:wrap}

/* Empty state */
.empty-state{
  text-align:center;padding:48px 20px;
  color:var(--empty);font-size:clamp(14px,3vw,17px);
  line-height:2;
}
.map-container img{
  width:100%;height:auto;display:block;
  border-radius:12px;
}
.size-tag{
  display:inline-flex;align-items:center;gap:4px;
  padding:4px 10px;border-radius:8px;
  background:var(--surface-soft);font-size:13px;font-weight:600;
}
.size-대형{color:#ffcc44;border:1px solid rgba(255,204,68,0.3)}
.size-중형{color:#88ccff;border:1px solid rgba(136,204,255,0.3)}
.size-소형{color:#aaddaa;border:1px solid rgba(170,221,170,0.3)}

.empty-state .big-emoji{font-size:48px;display:block;margin-bottom:12px}

/* ── Footer ── */
footer{
  text-align:center;padding:24px;
  color:var(--footer);font-size:12px;
  border-top:1px solid var(--border-soft);margin-top:32px;
}

/* ── Loading ── */
.loading{
  text-align:center;padding:40px;color:var(--loading);
  font-size:14px;
}
.loading::after{
  content:'';display:block;width:30px;height:30px;
  border:3px solid #333;border-top-color:#6a40cc;
  border-radius:50%;margin:12px auto 0;
  animation:spin 0.8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes coupang-neon-pulse{
  0%,100%{
    box-shadow:
      0 0 0 1px rgba(255,215,102,0.22),
      0 0 12px rgba(255,204,68,0.16),
      0 0 24px rgba(255,170,40,0.1);
  }
  50%{
    box-shadow:
      0 0 0 1px rgba(255,240,176,0.42),
      0 0 24px rgba(255,215,102,0.4),
      0 0 44px rgba(255,170,40,0.24);
  }
}
@keyframes coupang-neon-sheen{
  0%{transform:translateX(-135%) rotate(10deg);opacity:0}
  18%{opacity:0}
  32%{opacity:0.95}
  48%{transform:translateX(135%) rotate(10deg);opacity:0}
  100%{transform:translateX(135%) rotate(10deg);opacity:0}
}
html[data-theme="light"] header h1{
  background:linear-gradient(90deg,#c85d1e,#de8c2f,#8e52ef);
  -webkit-background-clip:text;
  background-clip:text;
}
html[data-theme="light"] .section-title{color:#6f4ee2}
html[data-theme="light"] .map-btn.secondary{
  background:linear-gradient(135deg,#c9b8aa,#a88f80);
  color:#fff;
}
html[data-theme="light"] .area-card.coupang-card{
  border-color:rgba(217,145,44,0.9)!important;
  background:linear-gradient(145deg,rgba(255,241,214,0.96),rgba(255,232,190,0.92))!important;
  box-shadow:
    0 0 0 1px rgba(237,176,76,0.5),
    0 0 22px rgba(255,187,73,0.34),
    0 0 42px rgba(224,148,39,0.2);
}
html[data-theme="light"] .area-card.coupang-card::after{
  background:linear-gradient(115deg,transparent 34%,rgba(255,255,255,0.7) 50%,transparent 66%);
}
html[data-theme="light"] .area-card.coupang-card:hover{
  border-color:rgba(202,118,19,1)!important;
  box-shadow:
    0 0 0 1px rgba(214,139,31,0.66),
    0 0 28px rgba(255,184,65,0.48),
    0 0 54px rgba(214,139,31,0.28);
}
html[data-theme="light"] .area-card:hover,
html[data-theme="light"] .spot-card:hover{
  border-color:#d6996d;
}
html[data-theme="light"] .loading::after{
  border:3px solid #e3d5ca;
  border-top-color:#c66d31;
}
</style>
</head>
<body>

<header class="utility-header">
  <div class="utility-header-inner">
    <span style="color: #8899bb; font-size: 0.9rem;">황금 가성비 골드픽에서 쇼핑 정보를 확인하세요!</span>
    <a href="/" style="display: inline-block; margin-left: 10px; color: #00d1ff; font-weight: bold; text-decoration: none; font-size: 0.9rem;">가성비 TOP 3 구매 가이드 보러가기 →</a>
    <button type="button" class="theme-toggle" id="themeToggle" aria-pressed="false">☀️ 라이트 테마</button>
  </div>
</header>

<header>
  <h1>🎮 서울 인형뽑기 성지 가이드</h1>
  <p>직접 다녀오고 추천하는 인형뽑기 명소</p>
</header>

<div class="play-banner">
  <a href="claw-machine.html">
    <span>🕹️</span> 온라인 인형뽑기 체험하기
  </a>
</div>

<main>
  <div id="listView"></div>
  <div id="detailView" style="display:none"></div>
</main>

<footer>
  <p>서울 인형뽑기 성지 가이드 &copy; 2026 | 정보는 참고용이며 실제와 다를 수 있습니다</p>
</footer>

<script>
// ─── Data Layer ───
let areasData = null;
const detailCache = {};

function applyTheme(theme){
  document.documentElement.setAttribute('data-theme', theme);
  const themeToggle = document.getElementById('themeToggle');
  if(themeToggle){
    const isLight = theme === 'light';
    themeToggle.textContent = isLight ? '🌙 다크 테마' : '☀️ 라이트 테마';
    themeToggle.setAttribute('aria-pressed', String(isLight));
  }
}

function initThemeToggle(){
  const themeToggle = document.getElementById('themeToggle');
  if(!themeToggle) return;
  const currentTheme = document.documentElement.getAttribute('data-theme') || 'dark';
  applyTheme(currentTheme);
  themeToggle.addEventListener('click', () => {
    const nextTheme = (document.documentElement.getAttribute('data-theme') || 'dark') === 'light' ? 'dark' : 'light';
    applyTheme(nextTheme);
    try {
      localStorage.setItem('clawGuideTheme', nextTheme);
    } catch (e) {}
  });
}

async function loadAreas(){
  if(areasData) return areasData;
  const res = await fetch('data/areas.json');
  areasData = await res.json();
  return areasData;
}

async function loadDetail(id){
  if(detailCache[id]) return detailCache[id];
  const res = await fetch(`data/${id}.json`);
  const data = await res.json();
  detailCache[id] = data;
  return data;
}

// ─── Render: List View ───
function renderListView(areas){
  let html = '<div class="area-grid">';
  
  areas.forEach(a => {
    const isEmpty = a.spotCount === 0;
    if(a.id === 'geondae'){
      html += `
        <div class="area-card coupang-card" style="cursor:default; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:10px;">
          <a href="https://link.coupang.com/a/ek4gDo" target="_blank" referrerpolicy="unsafe-url" style="display:block; transform:scale(0.85); margin:-15px 0;">
            <img src="https://image1.coupangcdn.com/image/affiliate/banner/e862e13c7284f83115bf1e796a0c81f8@2x.jpg" alt="?낆냼??誘몃땲 ?명삎戮묎린 湲곌퀎" width="120" height="240" style="border-radius:8px;">
          </a>
          <div style="font-size:10px; color:#667799; text-align:center; margin-top:5px; font-weight:500; line-height:1.2;">
            ???ъ뒪?낆? 荑좏뙜 ?뚰듃?덉뒪 ?쒕룞???쇳솚?쇰줈<br>?쇱젙?≪쓽 ?섏닔猷뚮? ?쒓났諛쏆뒿?덈떎
          </div>
        </div>`;
    }
    html += `
      <div class="area-card${isEmpty?' empty':''}" ${isEmpty?'':`onclick="location.hash='${a.id}'"`}>
        <div class="card-top">
          <span class="card-emoji">${a.emoji}</span>
          <div>
            <div class="card-title">${a.name}</div>
            <div class="card-station">${a.station} ${a.exit}</div>
          </div>
        </div>
        <div class="card-summary">${a.summary}</div>
        ${!isEmpty ? `
        <div class="card-stats">
          <span>🏪 ${a.spotCount}개 매장</span>
          <span>🎰 ${a.totalMachines}대</span>
          <span>📍 ${a.radius}</span>
          <span>🚶 투어 ${a.totalDistance}</span>
        </div>` : ''}
        ${a.environment.length ? `
        <div class="card-envs">
          ${a.environment.map(e=>`<span class="env-tag">${e}</span>`).join('')}
        </div>` : ''}
        ${a.tags.length ? `
        <div class="card-tags">
          ${a.tags.map(t=>`<span class="spot-tag tag-${t}">${t}</span>`).join('')}
        </div>` : ''}
      </div>`;
    
    // 건대(geondae) 다음에 첫 번째 쿠팡 배너 삽입
    if(false && a.id === 'geondae'){
      html += `
        <div class="area-card coupang-card" style="cursor:default; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:10px;">
          <a href="https://link.coupang.com/a/ek4gDo" target="_blank" referrerpolicy="unsafe-url" style="display:block; transform:scale(0.85); margin:-15px 0;">
            <img src="https://image1.coupangcdn.com/image/affiliate/banner/e862e13c7284f83115bf1e796a0c81f8@2x.jpg" alt="업소용 미니 인형뽑기 기계" width="120" height="240" style="border-radius:8px;">
          </a>
          <div style="font-size:10px; color:#667799; text-align:center; margin-top:5px; font-weight:500; line-height:1.2;">
            이 포스팅은 쿠팡 파트너스 활동의 일환으로<br>일정액의 수수료를 제공받습니다
          </div>
        </div>`;
    }

    // 신림(sinlim) 다음에 두 번째 쿠팡 배너 삽입
    if(a.id === 'sinlim'){
      html += `
        <div class="area-card coupang-card" style="cursor:default; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:10px;">
          <a href="https://link.coupang.com/a/ek4rgW" target="_blank" referrerpolicy="unsafe-url" style="display:block; transform:scale(0.85); margin:-15px 0;">
            <img src="https://image13.coupangcdn.com/image/affiliate/banner/a5ea46c9cfa6c620061e5de6d74733cf@2x.jpg" alt="캐치핑 미니 인형뽑기 기계" width="120" height="240" style="border-radius:8px;">
          </a>
          <div style="font-size:10px; color:#667799; text-align:center; margin-top:5px; font-weight:500; line-height:1.2;">
            이 포스팅은 쿠팡 파트너스 활동의 일환으로<br>일정액의 수수료를 제공받습니다
          </div>
        </div>`;
    }
  });
  
  html += '</div>';
  return html;
}

// ─── Render: Stars ───
function renderStars(rating){
  const full = Math.floor(rating);
  const half = rating % 1 >= 0.5;
  let s = '★'.repeat(full);
  if(half) s += '½';
  s += '☆'.repeat(5 - full - (half?1:0));
  return s;
}

// ─── Render: Detail View ───
function renderDetailView(d){
  const hasSpots = d.spots && d.spots.length > 0;
  const hasRoute = d.route && d.route.steps && d.route.steps[0] !== '정보 준비 중입니다';

  let html = `
    <button class="detail-back" onclick="location.hash=''">← 목록으로</button>
    <div class="detail-header">
      <h2>${d.name}</h2>
      <div class="sub">📍 ${d.station} ${d.exit}</div>
    </div>`;

  // Route section
  html += `<div class="section-title">🗺️ 이동 경로</div>`;
  if(hasRoute){
    html += `
      <ol class="route-steps">
        ${d.route.steps.map(s=>`<li>${s}</li>`).join('')}
      </ol>
      <div class="route-distance">📏 ${d.route.totalDistance}</div>`;

    const shortsUrls = d.route.shortsUrls || (d.route.shortsUrl ? [d.route.shortsUrl] : []);
    if(shortsUrls.length){
      html += `<div class="section-title">🎬 영상으로 보기</div>
        <div class="shorts-list">
          ${shortsUrls.map(url => {
            const id = url.split('/shorts/')[1]?.split('?')[0];
            return id ? `<div class="shorts-container"><iframe src="https://www.youtube.com/embed/${id}" allowfullscreen loading="lazy"></iframe></div>` : '';
          }).join('')}
        </div>`;
    }

    if(d.route.mapImage){
      html += `
        <div class="map-container">
          <img src="${d.route.mapImage}" alt="${d.name} 지도" loading="lazy">
        </div>`;
    } else if(d.route.naverMapUrl){
      html += `
        <div class="map-container">
          <iframe src="${d.route.naverMapUrl}" allowfullscreen loading="lazy"></iframe>
        </div>
        <div class="map-actions">
          <a class="map-btn" href="${d.route.naverMapUrl}" target="_blank" rel="noopener">🗺️ 지도 크게 보기</a>
          ${d.route.naverStreetViewUrl ? `<a class="map-btn secondary" href="${d.route.naverStreetViewUrl}" target="_blank" rel="noopener">👀 거리뷰 보기</a>` : ''}
        </div>`;
    }
  } else {
    html += `<div class="empty-state"><span class="big-emoji">🚧</span>경로 정보를 준비 중입니다</div>`;
  }

  // Spots section
  html += `<div class="section-title">🏪 매장 정보 (${d.spots?.length || 0}곳)</div>`;
  
  // Coupang Ad for specific areas
  const targetAreas1 = ['hongdae', 'gangnam', 'geondae'];
  const targetAreas2 = ['yeonsinnae', 'jongro', 'sinlim'];
  
  if(targetAreas1.includes(d.id)){
    html += `
      <div class="detail-ad-banner">
        <a href="https://link.coupang.com/a/ek4gDo" target="_blank" referrerpolicy="unsafe-url">
          <img src="https://image1.coupangcdn.com/image/affiliate/banner/e862e13c7284f83115bf1e796a0c81f8@2x.jpg" alt="업소용 미니 인형뽑기 기계" width="120" height="240">
        </a>
        <div class="detail-ad-label">이 포스팅은 쿠팡 파트너스 활동의 일환으로 일정액의 수수료를 제공받습니다</div>
      </div>`;
  } else if(targetAreas2.includes(d.id)){
    html += `
      <div class="detail-ad-banner">
        <a href="https://link.coupang.com/a/ek4rgW" target="_blank" referrerpolicy="unsafe-url">
          <img src="https://image13.coupangcdn.com/image/affiliate/banner/a5ea46c9cfa6c620061e5de6d74733cf@2x.jpg" alt="캐치핑 미니 인형뽑기 기계" width="120" height="240">
        </a>
        <div class="detail-ad-label">이 포스팅은 쿠팡 파트너스 활동의 일환으로 일정액의 수수료를 제공받습니다</div>
      </div>`;
  }

  if(hasSpots){
    html += `<div class="spot-list">${d.spots.map(sp => `
      <div class="spot-card${sp.recommended?' recommended':''}">
        <div class="spot-top">
          <span class="spot-name">${sp.name}</span>
          ${sp.recommended ? '<span class="spot-rec-badge">⭐ 추천</span>' : ''}
        </div>
        <div class="spot-info">
          ${sp.size ? `
            <div><span class="label">규모</span></div>
            <div>
              <span class="size-tag size-${sp.size}">
                ${sp.size === '대형' ? '🏢' : sp.size === '중형' ? '🏠' : '🏪'} ${sp.size}
              </span>
            </div>` : ''}
          ${sp.machineCount ? `<div><span class="label">뽑기 대수</span></div><div>${sp.machineCount}대</div>` : ''}
          ${sp.priceRange ? `<div><span class="label">가격대</span></div><div>${sp.priceRange}</div>` : ''}
          ${sp.hours ? `<div><span class="label">영업시간</span></div><div>${sp.hours}</div>` : ''}
        </div>
        <div class="spot-rating">
          <span class="spot-stars">${renderStars(sp.rating)}</span>
          <span class="spot-rating-num">${sp.rating.toFixed(1)}</span>
        </div>
        <div class="spot-comment">"${sp.comment}"</div>
        ${sp.naverStreetViewUrl ? `
        <div class="spot-actions">
          <a class="map-btn secondary" href="${sp.naverStreetViewUrl}" target="_blank" rel="noopener">👀 거리뷰</a>
          <button class="map-btn secondary" onclick="loadSpotStreetView('${sp.naverStreetViewUrl}')">📍 여기서 보기</button>
        </div>` : ''}
      </div>`).join('')}</div>`;
  } else {
    html += `<div class="empty-state"><span class="big-emoji">🏗️</span>아직 매장 정보를 준비 중입니다<br>곧 업데이트 예정!</div>`;
  }

  return html;
}

// ─── Street View: load in page ───
function loadSpotStreetView(url){
  const container = document.getElementById('streetViewContainer');
  if(container){
    container.innerHTML = `<iframe src="${url}" allowfullscreen loading="lazy" style="width:100%;height:300px;border:none"></iframe>`;
    container.scrollIntoView({behavior:'smooth', block:'center'});
  }
}

// ─── Router ───
async function router(){
  const hash = location.hash.slice(1);
  const listView = document.getElementById('listView');
  const detailView = document.getElementById('detailView');

  if(!hash){
    listView.innerHTML = '<div class="loading">불러오는 중...</div>';
    listView.style.display = '';
    detailView.style.display = 'none';
    const data = await loadAreas();
    listView.innerHTML = renderListView(data.areas);
  } else {
    detailView.innerHTML = '<div class="loading">불러오는 중...</div>';
    listView.style.display = 'none';
    detailView.style.display = '';
    try {
      const detail = await loadDetail(hash);
      detailView.innerHTML = renderDetailView(detail);
      window.scrollTo(0, 0);
    } catch(e) {
      detailView.innerHTML = '<div class="empty-state"><span class="big-emoji">❌</span>해당 지역 정보를 찾을 수 없습니다</div>';
    }
  }
}

window.addEventListener('hashchange', router);
window.addEventListener('DOMContentLoaded', () => {
  initThemeToggle();
  router();
});
</script>
