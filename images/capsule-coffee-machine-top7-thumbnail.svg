<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">내 머신에 맞는 호환 캡슐 추천 TOP 7</title>
  <desc id="desc">커피머신과 여러 캡슐을 함께 보여주는 검색용 썸네일</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbf6ee"/>
      <stop offset="100%" stop-color="#efe3cf"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fffdf9"/>
      <stop offset="100%" stop-color="#f7efe0"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffeab0"/>
      <stop offset="50%" stop-color="#d7ab3d"/>
      <stop offset="100%" stop-color="#8e6415"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#8f7132" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1040" cy="88" r="112" fill="#f7ead2" opacity="0.8"/>
  <circle cx="90" cy="520" r="140" fill="#f3e4c4" opacity="0.75"/>

