    <rect x="232" y="78" width="20" height="82" rx="10" fill="#0f141d"/>
    <ellipse cx="242" cy="176" rx="40" ry="18" fill="#4a3825"/>
    <ellipse cx="242" cy="170" rx="34" ry="12" fill="#8f6234"/>
    <rect x="62" y="162" width="88" height="10" rx="5" fill="#b3873e"/>
