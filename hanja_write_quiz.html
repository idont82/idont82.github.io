    exp:'級訓: 등급 급 + 가르칠 훈\n給食: 줄 급 + 먹을 식\n不戰勝: 아닐 부 + 싸움 전 + 이길 승'
  },
  {
    page:'44쪽', pts:2, type:'dan',
    q:'다음 설명에 해당하는 한자 어휘를 쓰시오.',
    bogi:[],
    subs:[
      {label:'(1)', hint:'두 사람이 서로 발목을 묶어 세 발처럼 함께 뛰는 경기 →', ans:'二人三脚', alt:['이인삼각']},
      {label:'(2)', hint:'가르치고 배우면서 서로 성장함 (예기禮記 유래) →', ans:'教學相長', alt:['교학상장']}
    ],
    exp:'二人三脚: 두 이 + 사람 인 + 석 삼 + 다리 각\n教學相長: 가르칠 교 + 배울 학 + 서로 상 + 자랄 장'
  }
];

const essay2 = [
  {
    page:'44쪽', pts:5, type:'essay',
    q:'다음 물음 (1)과 (2)에 답하시오.',
    sub:`(1) 아래 어휘의 한자 표기와 뜻을 각각 서술하시오.
    ① 지각  ② 담임  ③ 성적  ④ 급식

(2) '遲刻'과 소리가 같은 동음이의어를 한자로 쓰고 뜻을 서술하시오.`,
    ans:`(1)
① 遲刻(지각): 정해진 시각보다 늦게 출근하거나 등교함
② 擔任(담임): 어떤 학급이나 학년을 책임지고 맡아보는 일, 또는 그런 사람
③ 成績(성적): 해 온 일의 결과로 얻은 실적 / 배운 지식·기능·태도 등을 평가한 결과
④ 給食(급식): 식사[食]를 공급함[給], 또는 그 식사

(2) 知覺(지각): 깨달아 아는 것, 사물을 분별하는 능력`,
    check:['(1) 遲刻 한자·뜻 정확히 서술','(1) 擔任 한자·뜻 정확히 서술','(1) 成績 한자·뜻 정확히 서술','(1) 給食 한자·뜻 정확히 서술','(2) 知覺 한자 표기 + 뜻 포함']
  },
  {
    page:'44·47쪽', pts:7, type:'essay',
    q:'다음 물음 (1)~(3)에 답하시오.',
    sub:`(1) 아래 어휘의 한자 표기와 뜻을 각각 서술하시오.
    ① 구기  ② 이인삼각  ③ 부전승  ④ 계주  ⑤ 급훈

(2) '不戰勝'에서 '不'을 '부'로 읽는 이유를 한자 표기를 포함하여 서술하시오.

(3) '二人三脚'에서 '脚'의 부수가 '肉'인 이유를 서술하시오.`,
    ans:`(1)
① 球技(구기): 공[球]을 사용하는 운동 경기[技]
② 二人三脚(이인삼각): 두[二] 사람[人]이 서로 발목을 묶어 세[三] 발[脚]처럼 하여 함께 뛰는 경기
③ 不戰勝(부전승): 추첨이나 기권 등으로 경기를 치르지 않고[不戰] 이기는[勝] 일
④ 繼走(계주): 일정한 구간을 나누어 차례로 배턴을 주고받으며 이어[繼] 달리는[走] 육상 경기
⑤ 級訓(급훈): 학급[級]에서 교육 목표로 정한 덕목[訓]

(2) '不'은 'ㄷ'이나 'ㅈ' 앞에서 '부'로 읽기도 한다. 不戰勝에서 '戰'이 'ㅈ'으로 시작하므로 '부전승'이 된다.

(3) '肉(육)'은 신체 부위의 명칭이나 그 상태와 관련된 뜻을 나타내며, 부수로 쓰이면 '月'로 모양이 변하기도 한다. '脚'은 신체 부위인 다리를 뜻하므로 '肉'이 부수로 쓰였다.`,
    check:['(1) 球技·二人三脚 한자 표기 정확','(1) 不戰勝·繼走 한자 표기 정확','(1) 級訓 한자 표기 정확','(2) \'ㅈ\' 앞에서 \'부\'로 읽는 규칙 서술','(3) 肉 부수 – 신체 부위 관련 설명 포함']
  },
  {
    page:'44쪽', pts:8, type:'essay',
    q:'다음 물음 (1)~(3)에 답하시오.',
    sub:`(1) '教學相長'을 구성하는 네 한자의 음훈(音訓)을 각각 쓰시오.

(2) '教學相長'의 유래(출전)와 의미를 서술하시오.

(3) '교학상장'의 의미가 자신의 학교생활에서 어떻게 적용될 수 있는지 구체적인 예를 들어 서술하시오.`,
    ans:`(1)
教: 가르칠 교
學: 배울 학
相: 서로 상
長: 자랄 장

(2) '예기(禮記)'에 나오는 말로, '배워 본 이후에 자기의 부족함을 알 수 있으며, 가르쳐 본 이후에야 비로소 어려움을 알게 된다'는 글에서 유래했다. 가르치는 일과 배우는 일이 가르치는 사람과 배우는 사람 양쪽 모두에게 좋은 영향을 미침을 뜻한다.

(3) 예) 모둠 활동에서 내가 잘 아는 내용을 친구에게 설명하면 더욱 깊이 이해하게 되고, 친구의 질문을 통해 미처 몰랐던 부분을 깨닫게 된다. 이처럼 가르치고 배우는 과정이 서로에게 성장의 기회가 되는 것이 교학상장의 실천이다.`,
    check:['(1) 네 한자 음훈 모두 정확','(2) 예기(禮記) 출전 언급','(2) 뜻 정확히 서술','(3) 구체적 사례 포함']
  }
];

const allData = { dan1, essay1, dan2, essay2 };
let currentTab = 'dan1';
let current = 0;
let score = 0;
let stats = { correct:0, wrong:0, essay:0 };
let data = dan1;

function switchTab(tab) {
  currentTab = tab;
  data = allData[tab];
  current = 0; score = 0; stats = {correct:0,wrong:0,essay:0};
  ['dan1','essay1','dan2','essay2'].forEach(t => {
    document.getElementById('tab-'+t).className = 'tab-btn' + (t===tab?' active':'');
  });
  render();
}

function render() {
  if (current >= data.length) { showResult(); return; }
  const q = data[current];
  const pct = Math.round((current/data.length)*100);
  document.getElementById('prog').style.width = pct+'%';
  document.getElementById('q-counter').textContent = '문제 '+(current+1)+' / '+data.length;
  document.getElementById('q-score').textContent = q.type==='dan' ? '점수: '+score : '서논술형 진행 중';
  if (q.type==='dan') renderDan(q);
  else renderEssay(q);
}

function renderDan(q) {
  const bogiHtml = q.bogi.length
    ? `<div class="bogi"><span>보기</span>${q.bogi.join('　　')}</div>` : '';
  const subsHtml = q.subs.map((s,i) =>
    `<div class="sub-q">
      <div class="sub-label">${s.label}</div>
      <div style="flex:1">
        <div style="font-size:13px;color:var(--color-text-secondary);margin-bottom:6px;line-height:1.6;">${s.hint}</div>
        <input class="han-input wide" type="text" id="inp-${i}" placeholder="한자로 입력" onkeydown="if(event.key==='Enter')checkDan()" />
      </div>
    </div>`
  ).join('');
  document.getElementById('quiz-area').innerHTML = `
    <div class="q-card">
      <span class="badge badge-dan">단답형</span>
      <span class="page-tag">${q.page}</span>
      <span class="pts-tag">[${q.pts}점]</span>
      <div class="q-text">${q.q}</div>
      ${bogiHtml}
      <div class="sub-qs">${subsHtml}</div>
      <div class="action-row">
        <button class="btn" onclick="checkDan()">확인</button>
        <button class="btn" onclick="showDanAns()">정답 보기</button>
      </div>
      <div class="feedback" id="feedback"></div>
    </div>
    <button class="btn btn-next" id="btn-next" onclick="nextQ()">다음 문제 →</button>
  `;
  setTimeout(()=>{ const e=document.getElementById('inp-0'); if(e)e.focus(); },50);
}

function checkDan() {
  const q = data[current];
  let allCorrect = true;
  let fb = '';
  q.subs.forEach((s,i) => {
    const el = document.getElementById('inp-'+i);
    if (!el || el.disabled) return;
    const val = el.value.trim();
    const ok = val===s.ans || (s.alt && s.alt.includes(val));
    el.disabled = true;
    el.classList.add(ok ? 'correct' : 'wrong');
    if (!ok) { allCorrect = false; fb += `${s.label} 정답: ${s.ans}\n`; }
  });
  const fbEl = document.getElementById('feedback');
  if (allCorrect) {
    fbEl.className='feedback fb-correct';
    fbEl.textContent='정답! +'+q.pts+'점\n\n'+q.exp;
    score+=q.pts; stats.correct++;
  } else {
    fbEl.className='feedback fb-wrong';
    fbEl.textContent='일부 오답.\n'+fb+'\n'+q.exp;
    stats.wrong++;
  }
  fbEl.style.display='block';
  document.getElementById('btn-next').style.display='inline-block';
  document.getElementById('q-score').textContent='점수: '+score;
}

function showDanAns() {
  const q = data[current];
  q.subs.forEach((s,i)=>{ const e=document.getElementById('inp-'+i); if(e)e.disabled=true; });
  const fbEl = document.getElementById('feedback');
  fbEl.className='feedback fb-info';
  fbEl.textContent='정답:\n'+q.subs.map(s=>s.label+' '+s.ans).join('\n')+'\n\n'+q.exp;
  fbEl.style.display='block';
  document.getElementById('btn-next').style.display='inline-block';
  stats.wrong++;
}

function renderEssay(q) {
  document.getElementById('quiz-area').innerHTML = `
    <div class="q-card">
      <span class="badge badge-essay">서논술형</span>
      <span class="page-tag">${q.page}</span>
      <span class="pts-tag">[${q.pts}점]</span>
      <div class="q-text">${q.q}</div>
      ${q.sub ? '<div class="q-box">'+q.sub+'</div>' : ''}
      <textarea class="essay-input" id="essay-ans" placeholder="한자 표기와 뜻을 포함하여 작성하세요..."></textarea>
      <div class="action-row">
        <button class="btn" onclick="showEssayAns()">모범 답안 확인</button>
      </div>
      <div class="feedback" id="feedback"></div>
    </div>
    <button class="btn btn-next" id="btn-next" onclick="nextQ()">다음 문제 →</button>
  `;
}

function showEssayAns() {
  const q = data[current];
  const fbEl = document.getElementById('feedback');
  fbEl.className='feedback fb-info';
  const checkTxt = q.check ? '\n\n📋 채점 포인트:\n'+q.check.map((c,i)=>'  '+(i+1)+'. '+c).join('\n') : '';
  fbEl.textContent='모범 답안:\n\n'+q.ans+checkTxt+'\n\n자신의 답과 비교해 채점해 보세요!';
  fbEl.style.display='block';
  document.getElementById('essay-ans').disabled=true;
  const selfDiv=document.createElement('div');
  selfDiv.className='self-check';
  selfDiv.innerHTML=`
    <button class="self-btn self-ok" onclick="selfScore(true,${q.pts})">잘 썼어요 (+${q.pts}점)</button>
    <button class="self-btn self-no" onclick="selfScore(false,0)">더 공부해야 해요</button>`;
  fbEl.after(selfDiv);
  stats.essay++;
}

function selfScore(ok, pts) {
  if(ok){score+=pts; stats.correct++;} else stats.wrong++;
  document.querySelectorAll('.self-btn').forEach(b=>b.disabled=true);
  document.getElementById('btn-next').style.display='inline-block';
  document.getElementById('q-score').textContent='점수: '+score;
}

function nextQ() { current++; render(); }

function showResult() {
  document.getElementById('prog').style.width='100%';
  const total = data.reduce((s,q)=>s+q.pts,0);
  const pct = Math.round((score/total)*100);
  const msg = pct>=90?'완벽해요! 시험 준비 완료! 🎉':pct>=70?'잘 했어요! 조금만 더 복습해요! 💪':'틀린 문제를 다시 복습해 봐요! 📚';
  document.getElementById('q-counter').textContent='완료!';
  document.getElementById('q-score').textContent='';
  document.getElementById('quiz-area').innerHTML=`
    <div class="score-card">
      <div style="font-size:14px;color:var(--color-text-secondary);">최종 점수</div>
      <div class="score-big">${score}<span style="font-size:24px;color:var(--color-text-secondary);"> / ${total}</span></div>
      <div style="font-size:14px;color:var(--color-text-secondary);margin-bottom:1rem;">${msg}</div>
      <div class="score-grid">
        <div class="score-item"><div class="score-num" style="color:#185FA5;">${pct}%</div><div class="score-desc">정답률</div></div>
        <div class="score-item"><div class="score-num" style="color:#27500A;">${stats.correct}</div><div class="score-desc">정답</div></div>
        <div class="score-item"><div class="score-num" style="color:#A32D2D;">${stats.wrong}</div><div class="score-desc">오답</div></div>
      </div>
      <button class="restart-btn" onclick="restart()">다시 풀기</button>
    </div>`;
}

function restart() { current=0; score=0; stats={correct:0,wrong:0,essay:0}; render(); }

render();
</script>
