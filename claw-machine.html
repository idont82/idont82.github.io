<div id="nicknameOverlay">
  <div id="nicknameModal">
    <h2>🎮 반가워!</h2>
    <p>닉네임을 알려줘! 게임에서 불러줄게</p>
    <input type="text" id="nicknameInput" placeholder="닉네임 입력" maxlength="10" autocomplete="off">
    <br>
    <button id="nicknameSave">시작하기!</button>
  </div>
</div>

<div id="topMenuBar">
  <a href="claw-machine-guide.html" class="menu-btn back-btn">📍 성지 보기</a>
  <button id="nicknameEdit">👤 닉네임 설정</button>
  <div class="menu-right">
    <button id="sizeToggle" class="menu-btn size-btn">🪄 큰 인형 버전</button>
    <button id="collectionToggle" class="menu-btn coll-btn">🎁 <span id="collBadge" class="badge">0</span></button>
  </div>
</div>

<div id="gameContainer">
  <div id="charSelector">
    <button class="active" data-theme="shinchan">
      <div class="char-thumb" data-char="shin" data-theme-id="shinchan"></div>
      <span>짱구</span>
    </button>
    <button data-theme="cinnamoroll">
      <div class="char-thumb" data-char="cinna" data-theme-id="cinnamoroll"></div>
      <span>시나모롤</span>
    </button>
    <button data-theme="dino">
      <div class="char-thumb" data-char="trex" data-theme-id="dino"></div>
      <span>공룡</span>
    </button>
    <button data-theme="maenggu">
      <div class="char-thumb" data-char="maenggu" data-theme-id="maenggu"></div>
      <span>맹구</span>
    </button>  
    <button data-theme="hangyodon">
      <div class="char-thumb" data-char="hangyodon" data-theme-id="hangyodon"></div>
      <span>한교동</span>
    </button>
    <button data-theme="doraemon">
      <div class="char-thumb" data-char="doraemon" data-theme-id="doraemon"></div>
      <span>도라에몽</span>
    </button>
    <button data-theme="loopy">
      <div class="char-thumb" data-char="loopy" data-theme-id="loopy"></div>
      <span>루피</span>
    </button>
  </div>

  <div id="cabinet">
    <div id="titleBar">
      <div id="ledStrip"></div>
      <h1>🌟 꿈의 인형뽑기 🌟</h1>
    </div>
    <div id="viewport"></div>
    <div id="controlPanel">
      <div id="panelJoystick">
        <span class="joy-arrow up">▲</span>
        <span class="joy-arrow down">▼</span>
        <span class="joy-arrow left">◀</span>
        <span class="joy-arrow right">▶</span>
        <div id="joyStick"><div id="joyBall"></div></div>
      </div>
      <div id="coinBtn"><span>💰<br>COIN</span></div>
      <div id="startBtn"><span>CATCH</span></div>
      <div id="creditDisplay">
        <div style="color:#0f0" id="creditTxt">CREDIT: 3</div>
        <div style="color:#ff0" id="timeTxt">TIME: --</div>
        <div style="color:#0ff" id="scoreTxt">SCORE: 0</div>
      </div>
    </div>
  </div>

  <div id="gameAdFooter">
    <div class="ad-disclosure">이 포스팅은 쿠팡 파트너스 활동의 일환으로 수수료를 제공받습니다</div>
    <div id="bannerContainer" data-banner-mode="triple">
      <a href="https://link.coupang.com/a/ek4gDo" target="_blank" referrerpolicy="unsafe-url" class="q-banner">
        <img src="https://image1.coupangcdn.com/image/affiliate/banner/e862e13c7284f83115bf1e796a0c81f8@2x.jpg" alt="미니 인형뽑기">
      </a>
      <a href="https://link.coupang.com/a/ek4rgW" target="_blank" referrerpolicy="unsafe-url" class="q-banner">
        <img src="https://image13.coupangcdn.com/image/affiliate/banner/a5ea46c9cfa6c620061e5de6d74733cf@2x.jpg" alt="캐치핑 인형뽑기">
      </a>
      <a href="https://link.coupang.com/a/ek6ZFc" target="_blank" referrerpolicy="unsafe-url" class="q-banner">
        <img src="https://image13.coupangcdn.com/image/affiliate/banner/6ec5c3d390e8b7a962b8b7cc32f7390e@2x.jpg" alt="유니콘 인형뽑기">
      </a>
    </div>
  </div>
</div>

<div id="collectionBackdrop"></div>
<div id="collectionPanel">
  <div id="collectionHeader">
    <h2>🎁 내가 뽑은 인형</h2>
    <button id="collectionClose">&times;</button>
  </div>
  <div id="collectionList"></div>
</div>

<!-- Mobile touch controls -->
<div id="touchOverlay">
  <div id="touchJoystickArea"><div id="touchKnob"></div></div>
  <div id="touchGrabBtn">🪝<br>CATCH!</div>
</div>

<div id="msgOverlay"></div>
