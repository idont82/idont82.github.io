<svg xmlns="http://www.w3.org/2000/svg" width="720" height="420" viewBox="0 0 720 420" role="img" aria-labelledby="title desc">
  <title id="title">MBTI 16유형과 64유형 테스트 대표 이미지</title>
  <desc id="desc">MBTI 16유형에서 A/T와 C/S 축을 더해 64유형으로 확장되는 성격 테스트 카드 이미지</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="0.52" stop-color="#eef8f6"/>
      <stop offset="1" stop-color="#f6f1ff"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#6d5dfc"/>
      <stop offset="1" stop-color="#13b8a6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#0f172a" flood-opacity=".12"/>
    </filter>
  </defs>
  <rect width="720" height="420" rx="0" fill="url(#bg)"/>
  <circle cx="92" cy="74" r="92" fill="#6d5dfc" opacity=".12"/>
  <circle cx="630" cy="340" r="116" fill="#13b8a6" opacity=".12"/>
  <g filter="url(#shadow)">
    <rect x="70" y="72" width="580" height="276" rx="34" fill="#fff"/>
  </g>
  <rect x="106" y="110" width="130" height="44" rx="22" fill="#eef2ff"/>
  <text x="171" y="139" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="800" fill="#4f46e5">64 TEST</text>
  <text x="106" y="203" font-family="Arial, sans-serif" font-size="52" font-weight="900" fill="#0f172a">MBTI</text>
  <text x="106" y="254" font-family="Arial, sans-serif" font-size="42" font-weight="900" fill="#0f172a">16 → 64 유형</text>
  <text x="108" y="292" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#64748b">A/T · C/S 확장 성향 테스트</text>
  <g transform="translate(388 104)">
    <rect x="0" y="0" width="196" height="196" rx="30" fill="#f8fafc" stroke="#dbe4f0"/>
    <g transform="translate(28 28)">
      <rect x="0" y="0" width="62" height="62" rx="20" fill="url(#accent)"/>
      <text x="31" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="900" fill="#fff">IN</text>
      <rect x="78" y="0" width="62" height="62" rx="20" fill="#fff" stroke="#c7d2fe"/>
      <text x="109" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="900" fill="#4f46e5">TJ</text>
      <rect x="0" y="78" width="62" height="62" rx="20" fill="#fff" stroke="#99f6e4"/>
      <text x="31" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="900" fill="#0f766e">A</text>
      <rect x="78" y="78" width="62" height="62" rx="20" fill="#0f172a"/>
      <text x="109" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="900" fill="#fff">C</text>
    </g>
  </g>
  <g transform="translate(108 318)">
    <circle cx="0" cy="0" r="8" fill="#13b8a6"/>
    <circle cx="34" cy="0" r="10" fill="#8b5cf6"/>
    <circle cx="72" cy="0" r="12" fill="#f97316"/>
    <text x="104" y="7" font-family="Arial, sans-serif" font-size="18" font-weight="800" fill="#334155">성향을 더 자세히 보기</text>
  </g>
</svg>
